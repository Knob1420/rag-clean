<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG 检索对比 · Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #f0f2f5;
      color: #0f172a;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 14px; background: #eaecef;
      border-bottom: 1px solid #d0d5de; flex-wrap: wrap; flex-shrink: 0;
    }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; color: #0f172a; white-space: nowrap; }
    .brand-sub { font-size: 9px; color: #6e7681; font-family: 'JetBrains Mono', monospace; display: block; }
    .file-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      background: #d0d5de; border: 1px solid #a0aabb; border-radius: 7px;
      font-size: 12px; color: #0f172a; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .file-btn:hover { background: #c0c8d3; }
    .file-btn input { display: none; }
    .report-name { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6e7681; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .query-nav { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .query-nav label { font-size: 11px; color: #6e7681; white-space: nowrap; }
    .query-nav select {
      background: #d0d5de; border: 1px solid #a0aabb; border-radius: 7px;
      padding: 5px 9px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #0f172a; max-width: 300px;
    }
    .query-nav select:focus { outline: none; border-color: #a78bfa; }
    .nav-btn {
      width: 26px; height: 26px; display: grid; place-items: center;
      background: #d0d5de; border: 1px solid #a0aabb; border-radius: 6px;
      color: #475569; cursor: pointer; font-size: 10px; transition: all 0.15s;
    }
    .nav-btn:hover { background: #c0c8d3; color: #0f172a; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .spacer { flex: 1; }

    /* ── Query Bar ── */
    .query-bar {
      display: none; padding: 7px 14px; background: #eaecef;
      border-bottom: 1px solid #d0d5de;
      font-size: 11px; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
    }
    .query-bar.visible { display: flex; }
    .q-lbl { color: #6e7681; white-space: nowrap; }
    .q-val { color: #0f172a; font-weight: 500; }
    .q-badge { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
    .q-badge.intent { background: rgba(167,139,250,0.15); color: #7c3aed; }
    .q-badge.rewrite { background: rgba(249,115,22,0.15); color: #ea580c; }

    /* ── Main: BM25 | Vector | Hybrid | Answer ── */
    .main {
      display: flex; height: calc(100vh - 50px - 33px); overflow: hidden;
    }

    /* ── Chunk Column ── */
    .chunk-col {
      flex: 1; display: flex; flex-direction: column; border-right: 1px solid #d0d5de; overflow: hidden; min-width: 0;
    }
    .chunk-col:last-child { border-right: none; }
    .col-header {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 11px; border-bottom: 1px solid #d0d5de; background: #eaecef; flex-shrink: 0;
    }
    .cc-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
    .cc-dot.bm25 { background: #f97316; }
    .cc-dot.vector { background: #06b6d4; }
    .cc-dot.hybrid { background: #a78bfa; }
    .cc-title { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .cc-title.bm25 { color: #f97316; }
    .cc-title.vector { color: #06b6d4; }
    .cc-title.hybrid { color: #7c3aed; }
    .cc-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #6e7681; }

    /* Chunk list - 滚动区域 */
    .col-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 5px; }

    /* ── Chunk Item ── */
    .chunk-item {
      background: #ffffff; border: 1px solid #d0d5de;
      border-radius: 8px; padding: 9px 11px; cursor: pointer;
      transition: all 0.18s ease; position: relative;
    }
    .chunk-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2.5px; border-radius: 2px 0 0 2px; opacity: 0; transition: opacity 0.15s;
    }
    .chunk-item.bm25::before { background: #f97316; }
    .chunk-item.vector::before { background: #06b6d4; }
    .chunk-item.hybrid::before { background: #a78bfa; }
    .chunk-item:hover { border-color: #a0aabb; transform: translateX(2px); box-shadow: -2px 0 8px rgba(0,0,0,0.08); }
    .chunk-item:hover::before { opacity: 1; }
    .chunk-item.highlighted {
      border-color: #fbbf24 !important;
      background: rgba(251,191,36,0.08) !important;
      box-shadow: 0 0 0 2px rgba(251,191,36,0.3), 0 3px 12px rgba(251,191,36,0.15) !important;
    }
    .ci-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .ci-rank {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
      color: #6e7681; background: #f0f2f5;
      width: 17px; height: 17px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ci-title { font-size: 10px; color: #6e7681; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
    .ci-type {
      font-size: 9px; padding: 1px 4px; border-radius: 3px;
      background: #f0f2f5; color: #475569;
      font-family: 'JetBrains Mono', monospace; border: 1px solid #d0d5de;
    }
    .ci-score { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; }
    .ci-score.h { color: #16a34a; background: rgba(22,163,74,0.1); }
    .ci-score.m { color: #ea580c; background: rgba(234,88,12,0.1); }
    .ci-score.l { color: #dc2626; background: rgba(220,38,38,0.1); }
    .ci-content {
      font-size: 11.5px; line-height: 1.7; color: #475569;
      white-space: pre-wrap; word-break: break-word;
    }

    /* ── Answer Panel (rightmost) ── */
    .answer-panel { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid #d0d5de; background: #eaecef; }
    .ans-header {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px; border-bottom: 1px solid #d0d5de; background: #eaecef; flex-shrink: 0;
    }
    .ans-header .cc-dot { background: #16a34a; }
    .ans-header .cc-title { color: #16a34a; font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .ans-header .cc-count { font-family: 'JetBrains Mono', monospace; font-size: 9px; }
    .ans-body { flex: 1; overflow-y: auto; padding: 12px; }
    .ans-text { font-size: 13px; line-height: 1.9; color: #0f172a; white-space: pre-wrap; word-break: break-word; }
    .citation {
      color: #d97706; background: rgba(217,119,6,0.1);
      padding: 1px 5px; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px dashed rgba(217,119,6,0.5); transition: background 0.15s; white-space: nowrap;
    }
    .citation:hover { background: rgba(217,119,6,0.2); }
    .ans-meta { display: flex; gap: 10px; padding: 7px 12px; border-top: 1px solid #d0d5de; font-size: 10px; color: #6e7681; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; flex-wrap: wrap; }

    /* ── Empty ── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #6e7681; gap: 7px; text-align: center; padding: 20px; }
    .empty-icon { font-size: 28px; }
    .empty h3 { font-size: 12px; color: #475569; }
    .empty p { font-size: 11px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1c2128; border: 1px solid #30363d; border-radius: 7px; padding: 5px 14px; font-size: 11px; color: #e6edf3; z-index: 999; opacity: 0; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d5de; border-radius: 2px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="brand">RAG Viewer</div>
    <span class="brand-sub">检索对比</span>
  </div>
  <label class="file-btn">📂 加载报告<input type="file" accept=".json" onchange="loadFile(this.files[0])"></label>
  <span class="report-name" id="reportName">未加载报告</span>
  <div class="query-nav">
    <label>查询</label>
    <select id="querySelect" onchange="goToQuery(this.value)" style="display:none"><option value="">— 选择 —</option></select>
    <button class="nav-btn" id="prevBtn" onclick="prevQuery()" disabled>◀</button>
    <button class="nav-btn" id="nextBtn" onclick="nextQuery()" disabled>▶</button>
  </div>
  <div class="spacer"></div>
</div>

<!-- Query Bar -->
<div class="query-bar" id="queryBar">
  <span class="q-lbl">查询</span>
  <span class="q-val" id="qText"></span>
  <span class="q-badge intent" id="qIntent"></span>
  <span class="q-badge rewrite" id="qRewrite"></span>
</div>

<!-- Main: BM25 | Vector | Hybrid | Answer -->
<div class="main">

  <!-- BM25 -->
  <div class="chunk-col">
    <div class="col-header">
      <div class="cc-dot bm25"></div>
      <span class="cc-title bm25">BM25</span>
      <span class="cc-count" id="bm25Count">0</span>
    </div>
    <div class="col-list" id="bm25List"><div class="empty"><div class="empty-icon">📄</div><h3>等待加载</h3></div></div>
  </div>

  <!-- Vector -->
  <div class="chunk-col">
    <div class="col-header">
      <div class="cc-dot vector"></div>
      <span class="cc-title vector">Vector</span>
      <span class="cc-count" id="vectorCount">0</span>
    </div>
    <div class="col-list" id="vectorList"><div class="empty"><div class="empty-icon">📄</div><h3>等待加载</h3></div></div>
  </div>

  <!-- Hybrid -->
  <div class="chunk-col">
    <div class="col-header">
      <div class="cc-dot hybrid"></div>
      <span class="cc-title hybrid">Hybrid</span>
      <span class="cc-count" id="hybridCount">0</span>
    </div>
    <div class="col-list" id="hybridList"><div class="empty"><div class="empty-icon">📄</div><h3>等待加载</h3></div></div>
  </div>

  <!-- Answer (rightmost) -->
  <div class="answer-panel">
    <div class="ans-header">
      <div class="cc-dot"></div>
      <span class="cc-title">LLM 回答</span>
      <span class="cc-count" id="tokenCount">—</span>
    </div>
    <div class="ans-body" id="ansBody">
      <div class="empty"><div class="empty-icon">💬</div><h3>加载报告</h3><p>LLM 回答将显示在这里<br>点击来源跳转到对应 Chunk</p></div>
    </div>
    <div class="ans-meta" id="ansMeta" style="display:none">
      <span id="ansIntent">Intent: —</span>
      <span id="ansToken">Token: —</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let reportData = null;
  let currentIdx = 0;
  let chunks = { bm25: [], vector: [], hybrid: [] };
  let allChunks = [];

  /* ── Load ── */
  function loadFile(file) {
    if (!file) return;
    document.getElementById('reportName').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        reportData = JSON.parse(e.target.result);
        buildNav();
        goToQuery(0);
        showToast('已加载: ' + file.name);
      } catch { showToast('JSON 解析失败'); }
    };
    reader.readAsText(file);
  }

  function buildNav() {
    const sel = document.getElementById('querySelect');
    sel.innerHTML = '<option value="">— 选择查询 —</option>';
    reportData?.results?.forEach((r, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = (i + 1) + '. ' + r.query.substring(0, 65);
      sel.appendChild(opt);
    });
    sel.style.display = 'block';
  }

  function goToQuery(idx) {
    if (typeof idx === 'string') idx = parseInt(idx);
    if (idx < 0 || !reportData?.results) return;
    currentIdx = idx;
    document.getElementById('querySelect').value = idx;
    document.getElementById('prevBtn').disabled = currentIdx <= 0;
    document.getElementById('nextBtn').disabled = currentIdx >= reportData.results.length - 1;
    renderResult(reportData.results[idx]);
  }
  function prevQuery() { goToQuery(currentIdx - 1); }
  function nextQuery() { goToQuery(currentIdx + 1); }

  /* ── Render ── */
  function renderResult(r) {
    if (!r) return;

    document.getElementById('queryBar').classList.add('visible');
    document.getElementById('qText').textContent = r.query;
    const rw = r.rewrite || {};
    document.getElementById('qIntent').textContent = 'intent: ' + (rw.intent || '—');
    document.getElementById('qRewrite').textContent = 'rewritten: ' + ((rw.rewritten_queries || [])[0] || '—');

    allChunks = [];

    // BM25: bm25_raw 展平
    chunks.bm25 = flatten(r.bm25_raw || {});
    allChunks.push(...chunks.bm25.map(c => ({ ...c, _path: 'bm25' })));

    // Vector: vector_raw 展平
    chunks.vector = flatten(r.vector_raw || {});
    allChunks.push(...chunks.vector.map(c => ({ ...c, _path: 'vector' })));

    // Hybrid: 仅用 retrieval.chunks（rerank 后）
    chunks.hybrid = r.retrieval?.chunks || [];
    allChunks.push(...chunks.hybrid.map(c => ({ ...c, _path: 'hybrid' })));

    renderCol('bm25');
    renderCol('vector');
    renderCol('hybrid');
    renderAnswer(r);
  }

  function flatten(perQuery) {
    const out = [];
    for (const arr of Object.values(perQuery)) out.push(...(arr || []));
    return out;
  }

  function renderCol(path) {
    const list = document.getElementById(path + 'List');
    const total = chunks[path].length;

    document.getElementById(path + 'Count').textContent = total + ' 条';

    if (!total) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><h3>无数据</h3></div>';
      return;
    }

    list.innerHTML = '';
    chunks[path].forEach((c, i) => {
      const score = c.score || 0;
      const sClass = score >= 0.85 || score >= 8 ? 'h' : score >= 0.65 || score >= 4 ? 'm' : 'l';
      const sDisplay = score > 1 ? score.toFixed(2) : score.toFixed(4);
      const content = c.content_preview || c.content || '';
      const rank = i + 1;

      const item = document.createElement('div');
      item.className = `chunk-item ${path}`;
      item.dataset.chunkId = c.chunk_id || `u${i}`;
      item.dataset.docTitle = c.doc_title || '';
      item.innerHTML = `
        <div class="ci-meta">
          <span class="ci-rank">${rank}</span>
          <span class="ci-title" title="${escHtml(c.doc_title || '')}">${escHtml(c.doc_title || '—')}</span>
          <span class="ci-type">${c.chunk_type || 'other'}</span>
          <span class="ci-score ${sClass}">${sDisplay}</span>
        </div>
        <div class="ci-content">${escHtml(content)}</div>
      `;
      item.addEventListener('click', () => highlight(c.chunk_id, c.doc_title));
      list.appendChild(item);
    });
  }

  function renderAnswer(r) {
    const body = document.getElementById('ansBody');
    const meta = document.getElementById('ansMeta');
    const gen = r.generation;

    if (!gen?.answer) {
      body.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><h3>无回答</h3></div>';
      meta.style.display = 'none';
      document.getElementById('tokenCount').textContent = '—';
      return;
    }

    let answer = gen.answer
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');

    // [[chunk_id]]
    answer = answer.replace(/\[\[([^\]]+)\]\]/g, (m, id) => {
      const chunk = allChunks.find(c => c.chunk_id === id);
      const label = chunk ? (chunk.doc_title || id) : id;
      return `<span class="citation" onclick="highlight('${id}', '${escHtml(label)}')">[${escHtml(label)}]</span>`;
    });

    // [文档标题] style citations
    answer = answer.replace(/\[([^\]]{2,40})\]/g, (m, label) => {
      if (label.includes('[') || label.includes(']')) return m;
      const found = allChunks.filter(c => c.doc_title === label);
      if (found.length > 0) {
        return `<span class="citation" onclick="highlight('${found[0].chunk_id}', '${escHtml(label)}')">[${escHtml(label)}]</span>`;
      }
      return m;
    });

    body.innerHTML = `<div class="ans-text">${answer}</div>`;
    meta.style.display = 'flex';
    document.getElementById('tokenCount').textContent = gen.total_tokens ? `${gen.total_tokens} token` : '—';
    document.getElementById('ansIntent').textContent = 'Intent: ' + (r.rewrite?.intent || '—');
    document.getElementById('ansToken').textContent = gen.total_tokens ? `Token: ${gen.total_tokens}` : '';
  }

  /* ── Highlight ── */
  function highlight(chunkId, docTitle) {
    document.querySelectorAll('.chunk-item.highlighted').forEach(el => el.classList.remove('highlighted'));
    let targets = document.querySelectorAll(`.chunk-item[data-chunk-id="${chunkId}"]`);
    if (!targets.length && docTitle) {
      targets = document.querySelectorAll(`.chunk-item[data-doc-title="${docTitle}"]`);
    }
    if (!targets.length) { showToast('未找到: ' + (docTitle || chunkId)); return; }
    targets.forEach(el => {
      el.classList.add('highlighted');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    showToast('已高亮: ' + (docTitle || chunkId));
  }

  /* ── Helpers ── */
  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
